name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: www
          extra: --ignore-re "some-known-safe-warning"
        continue-on-error: true   # start as a warning, not a hard fail

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress './www/**/*.html'
        continue-on-error: true   # flip to false once you trust it

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://manjunathbscloud.github.io/banaFinClub/
          uploadArtifacts: true
          temporaryPublicStorage: true
