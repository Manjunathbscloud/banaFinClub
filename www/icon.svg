<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1E2F6E"/>
      <stop offset="100%" stop-color="#0D1535"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#2A44A8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0D1535" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8E680"/>
      <stop offset="40%" stop-color="#D4A020"/>
      <stop offset="100%" stop-color="#8C6008"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5DB60"/>
      <stop offset="100%" stop-color="#B87B10"/>
    </linearGradient>
    <linearGradient id="white-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D8E4FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Gold "B" — large bold serif -->
  <text x="148" y="282"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="900"
        font-size="245"
        fill="url(#gv)">B</text>

  <!-- White "F" / rupee-style symbol overlaid on B stem -->
  <!-- Vertical stem -->
  <rect x="172" y="110" width="20" height="168" rx="4" fill="url(#white-shine)" opacity="0.93"/>
  <!-- Top horizontal bar -->
  <rect x="172" y="110" width="78" height="17" rx="4" fill="url(#white-shine)" opacity="0.93"/>
  <!-- Middle horizontal bar -->
  <rect x="172" y="162" width="62" height="15" rx="4" fill="url(#white-shine)" opacity="0.78"/>

  <!-- Gold bar chart — 3 rising bars inside lower bump -->
  <rect x="196" y="228" width="23" height="54" rx="4" fill="url(#gv)" opacity="0.85"/>
  <rect x="227" y="200" width="23" height="82" rx="4" fill="url(#gv)" opacity="0.9"/>
  <rect x="258" y="170" width="23" height="112" rx="4" fill="url(#gv)"/>

  <!-- Gold swoosh arrow -->
  <path d="M 150,292 Q 195,362 300,272"
        stroke="url(#gh)" stroke-width="10" fill="none"
        stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="293,258 312,275 284,283" fill="#D4A020"/>

  <!-- Divider -->
  <line x1="56" y1="322" x2="456" y2="322" stroke="#D4A020" stroke-width="0.8" opacity="0.35"/>

  <!-- BANAKAR -->
  <text x="256" y="372"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="700"
        font-size="46"
        fill="white"
        letter-spacing="5">BANAKAR</text>

  <!-- Left dash + FINCLUB + right dash -->
  <line x1="66" y1="390" x2="146" y2="390" stroke="#D4A020" stroke-width="2"/>
  <text x="256" y="405"
        text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-weight="800"
        font-size="28"
        fill="#D4A020"
        letter-spacing="7">FINCLUB</text>
  <line x1="366" y1="390" x2="446" y2="390" stroke="#D4A020" stroke-width="2"/>

  <!-- Tagline -->
  <text x="256" y="440"
        text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="13"
        fill="rgba(255,255,255,0.58)"
        letter-spacing="1.5">SAVE • INVEST • GROW TOGETHER</text>
</svg>
